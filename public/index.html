<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casa Estela - Light Installation</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #16a34a; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: #64748b; }
        select, input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .id-preview { background: #f1f5f9; padding: 12px; border-radius: 8px; font-family: monospace; text-align: center; font-weight: bold; margin-bottom: 15px; border: 1px dashed #94a3b8; font-size: 1.1rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        button:disabled { background: #94a3b8; }
        .photo-btn { background: #f1f5f9; color: var(--primary); border: 2px dashed #94a3b8; margin-bottom: 10px; }
        .photo-preview { width: 100%; max-height: 200px; border-radius: 8px; object-fit: cover; margin-bottom: 10px; display: none; }
        #ocr-status { font-size: 0.8rem; text-align: center; color: #ca8a04; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🛠️ New Installation</h2>
        
        <div class="id-preview" id="id-preview">ESTELA-A-G-T-A1</div>

        <img id="image-preview" class="photo-preview" src="#">
        <div id="ocr-status">Processing Floor Sign...</div>
        <input type="file" id="photo-input" accept="image/*" capture="camera" style="display:none">
        <button type="button" class="photo-btn" onclick="document.getElementById('photo-input').click()">
            📷 Capture Floor & Light Photo
        </button>

        <label>Wing</label>
        <select id="wing" onchange="updatePreview()">
            <option value="A">Wing A</option><option value="B">Wing B</option>
            <option value="C">Wing C</option><option value="D">Wing D</option>
            <option value="E">Wing E</option><option value="F">Wing F</option>
            <option value="G">Wing G</option><option value="H">Wing H</option>
            <option value="I">Wing I</option><option value="J">Wing J</option>
        </select>

        <label>Floor</label>
        <select id="floor" onchange="updatePreview()">
            <option value="G">Ground</option>
        </select>

        <div class="grid-2">
            <div>
                <label>Light Type</label>
                <select id="type" onchange="handleTypeChange()">
                    <option value="T">Tube Light</option>
                    <option value="S">Surface Light</option>
                </select>
            </div>
            <div>
                <label>Side / Staircase</label>
                <select id="side" onchange="updatePreview()">
                    <option value="A">Staircase A</option>
                    <option value="B">Staircase B</option>
                </select>
            </div>
        </div>

        <label>Unit / Point No.</label>
        <select id="unit" onchange="updatePreview()"></select>

        <label>Old Light Status</label>
        <select id="old-status">
            <option value="Working">Working</option>
            <option value="Non-Working">Non-Working</option>
        </select>

        <button id="submit-btn" onclick="submitData()">Submit Record</button>
    </div>
</div>

<script>
    const floorSelect = document.getElementById('floor');
    const unitSelect = document.getElementById('unit');
    const typeSelect = document.getElementById('type');
    const photoInput = document.getElementById('photo-input');
    const imagePreview = document.getElementById('image-preview');
    const statusDiv = document.getElementById('ocr-status');

    // Init: Generate floors 01-17
    for(let i=1; i<=17; i++) {
        let opt = document.createElement('option');
        opt.value = i < 10 ? `0${i}` : i;
        opt.innerHTML = `Floor ${i}`;
        floorSelect.appendChild(opt);
    }

    // Handle Type Change (Surface vs Tube)
    function handleTypeChange() {
        if (typeSelect.value === 'S') {
            unitSelect.innerHTML = `
                <option value="A">Point A</option><option value="B">Point B</option>
                <option value="C">Point C</option><option value="D">Point D</option>`;
        } else {
            unitSelect.innerHTML = `
                <option value="1">Point 1</option><option value="2">Point 2</option>`;
        }
        updatePreview();
    }

    function updatePreview() {
        const id = `ESTELA-${document.getElementById('wing').value}-${floorSelect.value}-${typeSelect.value}-${document.getElementById('side').value}${unitSelect.value}`;
        document.getElementById('id-preview').innerText = id;
    }

    // Photo & OCR Logic
    photoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = async function() {
                imagePreview.src = this.result;
                imagePreview.style.display = 'block';
                statusDiv.style.display = 'block';
                const worker = await Tesseract.createWorker('eng');
                const { data: { text } } = await worker.recognize(this.result);
                const cleanText = text.toUpperCase();
                
                // Floor Auto-Detect
                if(cleanText.includes("G")) floorSelect.value = "G";
                for(let i=1; i<=17; i++) {
                    if(cleanText.includes(`FLOOR ${i}`) || cleanText.includes(` ${i} `)) {
                        floorSelect.value = i < 10 ? `0${i}` : i;
                    }
                }
                updatePreview();
                statusDiv.innerText = "Check dropdowns and submit.";
                await worker.terminate();
            };
            reader.readAsDataURL(file);
        }
    });

    async function submitData() {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = "Saving...";
        
        const payload = {
            generatedId: document.getElementById('id-preview').innerText,
            wing: document.getElementById('wing').value,
            floor: floorSelect.value,
            type: typeSelect.value,
            side: document.getElementById('side').value,
            unitNo: unitSelect.value,
            oldStatus: document.getElementById('old-status').value,
            photo: imagePreview.src
        };

        const res = await fetch('/api/install', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        if(result.success) {
            alert("Saved!");
            location.reload();
        } else {
            alert(result.message);
            btn.disabled = false; btn.innerText = "Submit Record";
        }
    }

    handleTypeChange(); // Set initial state
</script>
</body>
</html>
